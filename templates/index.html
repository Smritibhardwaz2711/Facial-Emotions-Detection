<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facial Emotion Detection</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 60px;
            height: 100vh;
            animation: fadeIn 1.5s ease-in-out;
        }

        .container {
            width: 80%;
            max-width: 700px;
            padding: 30px;
            background: rgba(0, 19, 77, 0.9);
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: pulse 3s ease-in-out infinite;
        }

        h1 {
            color: #ffffff;
            font-size: 2em;
            margin-bottom: 10px;
            animation: slideDown 1s ease-in-out;
        }

        p {
            color: #ffffff;
            font-size: 1rem;
            margin-bottom: 20px;
            animation: fadeIn 2s ease-in-out;
        }


        .custom-file-upload {
            background: linear-gradient(90deg, #007bff, #00b4d8);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }

        .custom-file-upload:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(0, 123, 255, 0.5);
        }

        input[type="file"] {
            display: none;
        }


        input[type="submit"] {
            background: linear-gradient(90deg, #28a745, #34d058);
            color: #fff;
            border: none;
            padding: 10px 30px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.4);
        }

        input[type="submit"]:hover {
            transform: scale(1.05) rotate(-1deg);
            box-shadow: 0 6px 15px rgba(40, 167, 69, 0.6);
        }

        /* 🌐 Open Camera link */
        a {
            color: #00bfff;
            text-decoration: none;
            font-size: 18px;
            margin-top: 20px;
            display: inline-block;
            transition: all 0.3s ease;
        }

        a:hover {
            color: #66ffff;
            transform: scale(1.1);
        }

        /* 🌟 Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 255, 255, 0.1); }
            50% { box-shadow: 0 0 25px rgba(255, 255, 255, 0.3); }
        }

        .signature {
            position: fixed;
            bottom: 15px;
            right: 25px;
            color: #ffffff;
            font-size: 0.9rem;
            font-style: italic;
            opacity: 0.8;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            animation: fadeIn 2s ease-in-out;
        }
        .signature:hover {
            opacity: 1;
            transform: scale(1.05);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
        }






    </style>
</head>

<body>
    <div class="container">

        <h1>😊 Facial Emotion Detection 😎</h1>
        <p>Emotions: 😠 Angry, 🤢 Disgust, 😨 Fear, 😄 Happy, 😐 Neutral, 😢 Sad, 😲 Surprise</p>


        <form action="{{ url_for('upload_file') }}" method="post" enctype="multipart/form-data">
            <label class="custom-file-upload">
                <input type="file" name="file" accept="image/*">
                Choose Image
            </label>
            <br>
            <input type="submit" value="Upload Image">
        </form>

        <a href="{{ url_for('camera') }}">Open Camera</a>


        <div class="signature">© 2025 Smriti Kumari</div>


    </div>

</body>
</html>
